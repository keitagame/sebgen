<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スーパーユーロビートジェネレータ</title>
<style>
  body { font-family: sans-serif; }
  #controls { display: flex; flex-direction: column; gap: 8px; width: 300px; }
  canvas { border: 1px solid #ccc; width:500px;}
</style>
</head>
<body>

  
<div id="controls">
  <input type="file" id="fontFile" accept=".ttf,.otf">
  <input type="text" id="textInput" placeholder="テキスト" value="SUPER EUROBEAT">
  <input type="number" id="fontSize" placeholder="サイズ(px)" value="127">
  <input type="color" id="fontColor" value="#000000">
  <input type="number" id="posX" placeholder="X位置" value="44">
  <input type="number" id="posY" placeholder="Y位置" value="211">
  <!-- テキスト1 の中に追加 -->

<label>アウトライン色</label>
<input type="color" id="outlineColor" value="#ffffff">

<label>アウトライン幅</label>
<input type="number" id="outlineWidth" value="8">

<label>横グラデーション開始</label>
<input type="color" id="gradX1" value="#ff0000">

<label>横グラデーション終了</label>
<input type="color" id="gradX2" value="#ffff00">

<label>縦グラデーション開始</label>
<input type="color" id="gradY1" value="#ffffff">

<label>縦グラデーション終了</label>
<input type="color" id="gradY2" value="#000000">

<label>
  <input type="checkbox" id="enableGradientX" checked>
  横グラデーション
</label>

<label>
  <input type="checkbox" id="enableGradientY">
  縦グラデーション
</label>
  <!-- controls 内に追加 -->

<!-- 背景 -->
<div class="group">
  <h3>背景</h3>

  <input type="file" id="bgImageFile" accept="image/*">

  <label>背景X</label>
  <input type="number" id="bgX" value="0">

  <label>背景Y</label>
  <input type="number" id="bgY" value="0">

  <label>背景幅</label>
  <input type="number" id="bgWidth" value="1280">

  <label>背景高さ</label>
  <input type="number" id="bgHeight" value="1280">
</div>
<!-- controls 内に追加 -->

<!-- テキスト3 -->
<div class="group">
  <h3>テキスト2</h3>

  <input type="file" id="fontFile3" accept=".ttf,.otf">

  <input type="text" id="textInput3" value="EVERLASTING DANCE TRAX SUPER EUROBEAT VOL.99">

  <input type="number" id="fontSize3" value="46">

  <input type="color" id="fontColor3" value="#000000">

  <input type="number" id="posX3" value="42">

  <input type="number" id="posY3" value="69">
</div>
<!-- テキスト2 -->
<div class="group">
  <h3>ボリューム</h3>
<!-- テキスト2 の中に追加 -->

<input type="file" id="fontFile2" accept=".ttf,.otf">
  <input type="text" id="textInput2" value="99">

  <input type="number" id="fontSize2" value="319">

  <input type="color" id="fontColor2" value="#000000">

  <input type="number" id="posX2" value="800">

  <input type="number" id="posY2" value="1225">
</div>

<!-- 画像 -->
<div class="group">
  <h3>画像</h3>

  <input type="file" id="imageFile" accept="image/*">

  <label>画像X</label>
  <input type="number" id="imgX" value="300">

  <label>画像Y</label>
  <input type="number" id="imgY" value="400">

  <label>画像幅</label>
  <input type="number" id="imgWidth" value="400">

  <label>画像高さ</label>
  <input type="number" id="imgHeight" value="400">

</div>
<!-- controls 内に追加 -->

<button id="downloadBtn">画像をダウンロード</button>
</div>

<canvas id="canvas" width="1280" height="1280"></canvas>

<script>
  // 追加

document.getElementById("downloadBtn").addEventListener("click", () => {

  const link = document.createElement("a");

  link.download = "image.png";

  link.href = canvas.toDataURL("image/png");

  link.click();
});
  // 追加
  // 追加
  // 追加
let loadedFontName3 = "既定3";
let loadedFontName2 = "既定2";
let overlayImage = null;
let backgroundImage = null;
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
// 追加

// テキスト3用フォント読み込み
document.getElementById("fontFile3").addEventListener("change", async (e) => {

  const file = e.target.files[0];
  if (!file) return;

  const fontData = await file.arrayBuffer();

  loadedFontName3 = "localFont3_" + Date.now();

  const font = new FontFace(
    loadedFontName3,
    fontData
  );

  await font.load();

  document.fonts.add(font);

  draw();
});
let loadedFontName = "既定";

async function loadDefaultFont() {
  const font = new FontFace(
    loadedFontName,
    'url("./super-eurobeat.otf")'
  );

  await font.load();
  document.fonts.add(font);
const font2 = new FontFace(
    loadedFontName2,
    'url("./AbrilFatface-Regular.ttf")'
  );

  await font2.load();
  document.fonts.add(font2);
  const font3 = new FontFace(
    loadedFontName3,
    'url("./AbrilFatface-Regular.ttf")'
  );

  await font3.load();
  document.fonts.add(font3);
  draw();
}

loadDefaultFont();
// 追加
// 追加

// テキスト2用フォント読み込み
document.getElementById("fontFile2").addEventListener("change", async (e) => {

  const file = e.target.files[0];
  if (!file) return;

  const fontData = await file.arrayBuffer();

  loadedFontName2 = "localFont2_" + Date.now();

  const font = new FontFace(
    loadedFontName2,
    fontData
  );

  await font.load();

  document.fonts.add(font);

  draw();
});
// 画像読み込み
document.getElementById("imageFile").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const img = new Image();

  img.onload = () => {
    overlayImage = img;
    draw();
  };

  img.src = URL.createObjectURL(file);
});

// 背景画像読み込み
document.getElementById("bgImageFile").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const img = new Image();

  img.onload = () => {
    backgroundImage = img;
    draw();
  };

  img.src = URL.createObjectURL(file);
});
// ローカルフォント読み込み
document.getElementById("fontFile").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const fontData = await file.arrayBuffer();
  loadedFontName = "localFont_" + Date.now();

  const font = new FontFace(loadedFontName, fontData);
  await font.load();
  document.fonts.add(font);

  draw();
});

// 既存の forEach を置き換え

[
  "textInput",
  "fontSize",
  "fontColor",
  "posX",
  "posY",

  "textInput2",
  "fontSize2",
  "fontColor2",
  "posX2",
  "posY2",

  "imgX",
  "imgY",
  "imgWidth",
  "imgHeight",

  "bgX",
  "bgY",
  "bgWidth",
  "bgHeight",
  // forEach 配列に追加
// forEach 配列に追加

"outlineColor",
"outlineWidth",

"gradX1",
"gradX2",

"gradY1",
"gradY2",

"enableGradientX",
"enableGradientY",
"textInput3",
"fontSize3",
"fontColor3",
"posX3",
"posY3",
].forEach(id => {
  document.getElementById(id).addEventListener("input", draw);
});

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
// draw() の clearRect の直後に追加

// 背景画像
if (backgroundImage) {

  const bgX = Number(document.getElementById("bgX").value);
  const bgY = Number(document.getElementById("bgY").value);

  const bgWidth =
    Number(document.getElementById("bgWidth").value);

  const bgHeight =
    Number(document.getElementById("bgHeight").value);

  ctx.drawImage(
    backgroundImage,
    bgX,
    bgY,
    bgWidth,
    bgHeight
  );
}

// 画像
if (overlayImage) {

  const imgX = Number(document.getElementById("imgX").value);
  const imgY = Number(document.getElementById("imgY").value);

  const imgWidth =
    Number(document.getElementById("imgWidth").value);

  const imgHeight =
    Number(document.getElementById("imgHeight").value);

  ctx.drawImage(
    overlayImage,
    imgX,
    imgY,
    imgWidth,
    imgHeight
  );
}
/*
  const text = document.getElementById("textInput").value;
  const size = document.getElementById("fontSize").value;
  const color = document.getElementById("fontColor").value;
  const x = Number(document.getElementById("posX").value);
  const y = Number(document.getElementById("posY").value);

  ctx.fillStyle = color;
  ctx.font = `${size}px ${loadedFontName}`;
  ctx.fillText(text, x, y);
  // draw() の最後に追加
*/
// テキスト1描画部分を置き換え

const text = document.getElementById("textInput").value;

const size =
  document.getElementById("fontSize").value;

const x =
  Number(document.getElementById("posX").value);

const y =
  Number(document.getElementById("posY").value);

ctx.font = `${size}px ${loadedFontName}`;

const metrics = ctx.measureText(text);

const textWidth = metrics.width;

const textHeight = Number(size);

// グラデーション
let fillStyle =
  document.getElementById("fontColor").value;

const enableGradientX =
  document.getElementById("enableGradientX").checked;

const enableGradientY =
  document.getElementById("enableGradientY").checked;

if (enableGradientX && enableGradientY) {

  const grad = ctx.createLinearGradient(
    x,
    y - textHeight,
    x + textWidth,
    y
  );

  grad.addColorStop(
    0,
    document.getElementById("gradX1").value
  );

  grad.addColorStop(
    0.5,
    document.getElementById("gradY1").value
  );

  grad.addColorStop(
    1,
    document.getElementById("gradX2").value
  );

  fillStyle = grad;

} else if (enableGradientX) {

  const grad = ctx.createLinearGradient(
    x,
    y,
    x + textWidth,
    y
  );

  grad.addColorStop(
    0,
    document.getElementById("gradX1").value
  );

  grad.addColorStop(
    1,
    document.getElementById("gradX2").value
  );

  fillStyle = grad;

} else if (enableGradientY) {

  const grad = ctx.createLinearGradient(
    x,
    y - textHeight,
    x,
    y
  );

  grad.addColorStop(
    0,
    document.getElementById("gradY1").value
  );

  grad.addColorStop(
    1,
    document.getElementById("gradY2").value
  );

  fillStyle = grad;
}

// アウトライン
ctx.lineJoin = "round";

ctx.lineWidth =
  Number(document.getElementById("outlineWidth").value);

ctx.strokeStyle =
  document.getElementById("outlineColor").value;

ctx.strokeText(text, x, y);

// 本体
ctx.fillStyle = fillStyle;
ctx.fillText(text, x, y);
// テキスト2
const text2 =
  document.getElementById("textInput2").value;

const size2 =
  document.getElementById("fontSize2").value;

const color2 =
  document.getElementById("fontColor2").value;

const x2 =
  Number(document.getElementById("posX2").value);

const y2 =
  Number(document.getElementById("posY2").value);

ctx.fillStyle = color2;
//ctx.font = `${size2}px ${loadedFontName}`;
// 置き換え

ctx.font = `${size2}px ${loadedFontName2}`;
ctx.fillText(text2, x2, y2);
// draw() の最後に追加

// テキスト3
const text3 =
  document.getElementById("textInput3").value;

const size3 =
  document.getElementById("fontSize3").value;

const color3 =
  document.getElementById("fontColor3").value;

const x3 =
  Number(document.getElementById("posX3").value);

const y3 =
  Number(document.getElementById("posY3").value);

ctx.fillStyle = color3;
ctx.font = `${size3}px ${loadedFontName3}`;
ctx.fillText(text3, x3, y3);
}
</script>

</body>
</html>
